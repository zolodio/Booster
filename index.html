<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="color-scheme" content="dark">
<title>Avatar TCG — Pack Opening</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
  --bg:#07090f;--bg2:#0f1322;--card:#151a2c;--card2:#1b2238;
  --txt:#e8e6f0;--txt2:#8b8fa8;--txt3:#5a5e78;
  --bdr:#252a42;--bdr2:#2f3555;
  --fire:#e8532e;--water:#2e8ce8;--earth:#5cb85c;--air:#f0c946;
  --zen:#b44ddf;--promo:#e8b632;--acc:#4a7dff;--ok:#3db86c;--bad:#e04848;
  --r:10px;--r2:16px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Nunito Sans',sans-serif;background:var(--bg);color:var(--txt);overflow:hidden;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}

.screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:flex-start;overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth}
.screen.active{display:flex}

/* LOADING */
#s-loading{align-items:center;justify-content:center}
.ring{width:52px;height:52px;border:3px solid rgba(74,125,255,.15);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px}
.ring-text{font-size:.8rem;color:var(--txt3);letter-spacing:.1em;text-transform:uppercase}
@keyframes spin{to{transform:rotate(360deg)}}

/* SETUP */
#s-setup{padding:20px 16px 100px;width:100%}
#s-setup-inner{max-width:680px;width:100%;margin:0 auto}
.setup-hd{text-align:center;padding:24px 0 22px}
.setup-hd h1{font-family:'Cinzel',serif;font-weight:900;font-size:1.7rem;background:linear-gradient(135deg,var(--air) 0%,var(--fire) 40%,var(--water) 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.setup-hd h2{font-family:'Cinzel',serif;font-size:.78rem;color:var(--txt3);font-weight:400;letter-spacing:.25em;text-transform:uppercase;margin-top:4px}
.sec-lbl{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--txt3);margin-bottom:10px}
.pt-row{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.pt-row::-webkit-scrollbar{display:none}
.ptc{flex:0 0 auto;background:var(--card);border:2px solid var(--bdr);border-radius:var(--r);padding:12px 18px;cursor:pointer;transition:all .2s;text-align:center;min-width:120px}
.ptc:hover{border-color:var(--bdr2)}
.ptc.sel{border-color:var(--acc);background:rgba(74,125,255,.07)}
.ptc-icon{font-size:1.5rem;margin-bottom:5px}
.ptc-name{font-family:'Cinzel',serif;font-size:.7rem;font-weight:700;color:var(--txt)}
.ptc-sub{font-size:.58rem;color:var(--txt3);margin-top:2px}

/* Custom pack image row */
#custom-img-row{margin-bottom:16px;padding:12px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r)}
.custom-img-inner{display:flex;gap:8px;align-items:flex-start;margin-top:8px}
#custom-img-inp{flex:1;background:var(--bg);border:1px solid var(--bdr);border-radius:var(--r);padding:9px 12px;color:var(--txt);font-family:'Nunito Sans',sans-serif;font-size:14px;outline:none}
#custom-img-inp::placeholder{color:var(--txt3)}
#custom-img-inp:focus{border-color:var(--acc)}
#custom-img-preview{margin-top:10px;display:flex;align-items:center;gap:10px}
#custom-img-thumb{height:56px;border-radius:6px;border:1px solid var(--bdr2);display:block}
.custom-img-hint{font-size:.65rem;color:var(--txt3)}

.slots-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.slot-count{font-size:.72rem;font-weight:700;color:var(--acc)}
.slots-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:20px}
@media(max-width:380px){.slots-grid{grid-template-columns:repeat(4,1fr)}}

/* Regular setup slots — standard TCG portrait ratio */
.slot{aspect-ratio:5/7;background:var(--card);border:2px dashed var(--bdr);border-radius:8px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;position:relative}
.slot:hover{border-color:var(--acc);border-style:solid}
.slot.has-card{border-style:solid;border-color:var(--bdr2)}
.slot.has-card:hover{border-color:var(--acc)}
.slot.chamber-slot{border-color:rgba(240,201,70,.4);aspect-ratio:11/27}
.slot img{width:100%;height:100%;object-fit:cover}
.slot-dot{position:absolute;top:4px;right:4px;width:8px;height:8px;border-radius:50%}
.slot-lbl{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.75);font-size:.52rem;font-weight:700;padding:3px 4px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slot-rm{position:absolute;top:2px;left:2px;width:18px;height:18px;background:rgba(224,72,72,.85);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.5rem;color:#fff;opacity:0;transition:opacity .15s;cursor:pointer;z-index:5}
.slot:hover .slot-rm{opacity:1}
.slot-empty-icon{font-size:1.1rem;color:var(--bdr2);margin-bottom:3px}
.slot-empty-txt{font-size:.52rem;color:var(--txt3);text-align:center;line-height:1.3;padding:0 4px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:11px 18px;border-radius:var(--r);font-family:'Nunito Sans',sans-serif;font-weight:700;font-size:.82rem;cursor:pointer;transition:all .2s;border:1px solid transparent;letter-spacing:.02em;white-space:nowrap}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-pri{background:var(--acc);color:#fff;border-color:var(--acc);flex:1}
.btn-pri:not(:disabled):hover{background:#5d8cff}
.btn-sec{background:var(--card);color:var(--txt2);border-color:var(--bdr)}
.btn-sec:hover{border-color:var(--bdr2);color:var(--txt)}
.btn-out{background:transparent;color:var(--txt2);border-color:var(--bdr)}
.btn-out:not(:disabled):hover{border-color:var(--acc);color:var(--acc)}
.code-row{display:flex;gap:8px}
.code-inp{flex:1;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 14px;color:var(--txt);font-family:'Nunito Sans',sans-serif;font-size:16px;outline:none}
.code-inp::placeholder{color:var(--txt3)}
.code-inp:focus{border-color:var(--acc)}

/* PICKER MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal-bg.open{display:flex}
.picker-sheet{width:100%;max-width:620px;max-height:88vh;background:var(--bg2);border-radius:20px 20px 0 0;border:1px solid var(--bdr);border-bottom:none;display:flex;flex-direction:column;overflow:hidden;animation:slideUp .3s cubic-bezier(.4,0,.2,1)}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.pk-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 12px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.pk-title{font-family:'Cinzel',serif;font-weight:700;font-size:1rem;color:var(--txt)}
.pk-close{background:none;border:none;color:var(--txt3);font-size:1.2rem;cursor:pointer;padding:4px;transition:color .2s}
.pk-close:hover{color:var(--txt)}
.pk-search-row{padding:12px 14px 8px;flex-shrink:0}
.pk-search{width:100%;background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:10px 14px;color:var(--txt);font-family:'Nunito Sans',sans-serif;font-size:16px;outline:none}
.pk-search::placeholder{color:var(--txt3)}
.pk-search:focus{border-color:var(--acc)}
.pk-filters{display:flex;gap:6px;padding:0 14px 10px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.pk-filters::-webkit-scrollbar{display:none}
.pf{flex:0 0 auto;background:var(--card);border:1px solid var(--bdr);border-radius:99px;padding:5px 12px;font-size:.7rem;font-family:'Nunito Sans',sans-serif;font-weight:700;color:var(--txt2);cursor:pointer;transition:all .15s;white-space:nowrap}
.pf:hover{border-color:var(--bdr2)}
.pf.act{background:var(--acc);color:#fff;border-color:var(--acc)}
.pf.fc.act{background:var(--earth);border-color:var(--earth)}
.pf.fr.act{background:var(--water);border-color:var(--water)}
.pf.fz.act{background:var(--zen);border-color:var(--zen)}
.pf.fp.act{background:var(--promo);border-color:var(--promo);color:#000}
.pf.fch.act{background:var(--air);border-color:var(--air);color:#000}
.pk-grid{overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:8px;padding:8px 14px 24px;flex:1}
.pk-item{background:var(--card);border:2px solid var(--bdr);border-radius:8px;overflow:hidden;cursor:pointer;transition:all .15s;position:relative}
.pk-item:hover{border-color:var(--acc);transform:translateY(-2px)}
.pk-item img{width:100%;aspect-ratio:5/7;object-fit:cover;display:block}
.pk-item-img-ph{width:100%;aspect-ratio:5/7;background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--txt3);font-size:.7rem}
.pk-rbar{position:absolute;top:0;left:0;right:0;height:3px}
.pk-name{padding:3px 5px 1px;font-size:.58rem;font-weight:700;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pk-num{font-size:.52rem;color:var(--txt3);padding:0 5px 4px}
.pk-none{grid-column:1/-1;text-align:center;color:var(--txt3);font-size:.82rem;padding:40px 0}

/* EXPERIENCE */
#s-exp{position:fixed;inset:0;overflow:hidden;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 25%,rgba(180,77,223,.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(46,140,232,.06) 0%,transparent 50%),var(--bg)}
.exp-back{position:absolute;top:14px;left:14px;background:var(--card);border:1px solid var(--bdr);border-radius:8px;color:var(--txt2);font-size:.76rem;font-family:'Nunito Sans',sans-serif;font-weight:700;padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;z-index:30}
.exp-back:hover{border-color:var(--bdr2);color:var(--txt)}
.exp-share{position:absolute;top:14px;right:14px;background:var(--card);border:1px solid var(--bdr);border-radius:8px;color:var(--txt2);font-size:.76rem;font-family:'Nunito Sans',sans-serif;font-weight:700;padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;z-index:30}
.exp-share:hover{border-color:var(--acc);color:var(--acc)}

/* PACK VISUAL */
#pack-stage{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;position:absolute;inset:0}

.pack-wrap{display:flex;flex-direction:column;align-items:center;cursor:pointer;position:relative}

.pack-top{width:200px;height:60px;position:relative;border-radius:12px 12px 0 0;overflow:hidden;clip-path:polygon(0 0,100% 0,100% 60%,93% 76%,87% 56%,81% 78%,75% 57%,68% 80%,62% 59%,56% 78%,50% 56%,44% 80%,38% 59%,31% 78%,25% 57%,18% 80%,12% 58%,6% 78%,0 58%);transform-origin:top center;transition:transform .55s cubic-bezier(.4,0,.2,1),opacity .45s ease;box-shadow:0 -4px 20px rgba(0,0,0,.4)}
.pack-top.fly{transform:translateY(-200px) translateX(50px) rotate(28deg) scale(0.55);opacity:0}
.pack-body{width:200px;height:280px;border-radius:0 0 12px 12px;overflow:hidden;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.05)}
.p-art{position:absolute;inset:0}
.p-foil{position:absolute;inset:0;background:linear-gradient(105deg,transparent 20%,rgba(255,255,255,.1) 50%,transparent 80%);background-size:300% 100%;animation:foil 4.5s ease-in-out infinite;mix-blend-mode:overlay;pointer-events:none}
@keyframes foil{0%{background-position:200% 0}50%{background-position:-100% 0}100%{background-position:200% 0}}
.p-glow{position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.06) 0%,transparent 50%,rgba(0,0,0,.2) 100%);pointer-events:none}
.p-sym{position:absolute;font-size:3.8rem;opacity:.14;user-select:none;pointer-events:none}
.p-sym.s1{top:30px;left:10px;transform:rotate(-18deg)}
.p-sym.s2{top:50px;right:8px;transform:rotate(22deg)}
.p-sym.s3{bottom:38px;left:18px;transform:rotate(12deg)}
.p-circle{position:absolute;border-radius:50%;opacity:.09}
.p-center-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:4rem;opacity:.16;user-select:none;pointer-events:none}

.pack-peek{
  display:flex;
  gap:5px;
  justify-content:center;
  align-items:flex-end;
  opacity:0;
  transform:translateY(-18px);
  transition:opacity .45s .32s, transform .45s .32s;
  pointer-events:none;
  padding-top:5px;
}
.pack-peek.show{opacity:1;transform:translateY(0)}
.peek-c{width:44px;height:60px;border-radius:5px;border:1px solid rgba(255,255,255,.16);overflow:hidden;box-shadow:0 6px 18px rgba(0,0,0,.65);background:#090d1c;flex-shrink:0}
.peek-c img{width:100%;height:100%;object-fit:cover;display:block}

.pack-wrap.floating{animation:pfloat 3s ease-in-out infinite}
@keyframes pfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.pack-wrap.shaking{animation:pshake .4s cubic-bezier(.36,.07,.19,.97)}
@keyframes pshake{10%,90%{transform:translate(-2px,0) rotate(-1deg)}20%,80%{transform:translate(3px,0) rotate(1deg)}30%,50%,70%{transform:translate(-4px,0) rotate(-1.5deg)}40%,60%{transform:translate(4px,0) rotate(1.5deg)}}

.hint-txt{position:absolute;bottom:52px;left:50%;transform:translateX(-50%);font-size:.75rem;color:var(--txt3);letter-spacing:.13em;text-transform:uppercase;animation:hblink 2.2s ease-in-out infinite;white-space:nowrap;pointer-events:none}
@keyframes hblink{0%,100%{opacity:.45}50%{opacity:1}}

.pull-btn{margin-top:30px;padding:14px 40px;background:linear-gradient(135deg,var(--zen),var(--acc));color:#fff;border:none;border-radius:99px;font-family:'Cinzel',serif;font-weight:700;font-size:.95rem;cursor:pointer;letter-spacing:.04em;box-shadow:0 6px 24px rgba(180,77,223,.35);transition:all .2s;animation:pbtnpulse 2s ease-in-out infinite}
.pull-btn:hover{transform:scale(1.06);box-shadow:0 8px 32px rgba(180,77,223,.55)}
@keyframes pbtnpulse{0%,100%{box-shadow:0 6px 24px rgba(180,77,223,.35)}50%{box-shadow:0 6px 32px rgba(180,77,223,.6)}}

/* ─── SPREAD STAGE ─── */
#spread-stage{
  position:fixed;
  inset:0;
  display:none;
  flex-direction:column;
  overflow:hidden;
}

/* Header bar in spread */
.spread-hd{
  flex:0 0 44px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 14px;
  margin-top:4px;
}
.spread-prog{
  font-size:.7rem;
  color:var(--txt3);
  letter-spacing:.1em;
  text-transform:uppercase;
  text-align:center;
  white-space:nowrap;
}
.spread-prog span{color:var(--zen);font-weight:700}

/*
  ─── CARD GRID ───
  5 columns. Regular cards: 5:7 portrait. Chamber card: 11:27 (tall portrait).

  --cw is the column width, computed as the smaller of:
    • (viewport width  − 36px padding/gaps) ÷ 5
    • (viewport height − 114px chrome)      ÷ 3.854
      where 3.854 = row1_ratio(1.4) + row2_ratio(2.454), i.e. the
      tallest possible stacked height for one column unit.

  This guarantees both rows always fit on screen regardless of device.
*/
.cards-grid{
  flex:1;
  min-height:0;
  display:grid;
  --cw: min(calc((100vw - 36px) / 5), calc((100vh - 114px) / 3.854));
  grid-template-columns:repeat(5, var(--cw));
  grid-auto-rows:auto;
  align-content:center;
  justify-content:center;
  align-items:start;
  gap:6px;
  padding:2px 6px 6px;
  width:100%;
}

/* Footer for done actions */
.spread-footer{
  flex:0 0 52px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 12px 6px;
}
.done-acts{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:opacity .4s;
}
.done-acts.show{opacity:1;pointer-events:all}

/* ─── CARD BASE ─── */
/* aspect-ratio:5/7 = standard 2.5"×3.5" TCG portrait. */
.sc{
  width:100%;
  aspect-ratio:5/7;
  position:relative;
  cursor:pointer;
  transition:transform .2s;
  perspective:900px;
}

.sc-inner{
  width:100%;
  height:100%;
  position:absolute;
  inset:0;
  transform-style:preserve-3d;
  transition:transform .62s cubic-bezier(.4,0,.2,1);
}
.sc.flipped .sc-inner{transform:rotateY(180deg)}
.sc:not(.flipped):hover{transform:translateY(-5px) scale(1.04);z-index:10}
.sc-back,.sc-face{
  position:absolute;
  inset:0;
  border-radius:8px;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  overflow:hidden;
}
.sc-back{
  background:linear-gradient(145deg,#12082a 0%,#0d1848 50%,#12082a 100%);
  border:1px solid rgba(255,255,255,.1);
  display:flex;
  align-items:center;
  justify-content:center;
}
.sc-back::after{content:'';width:55%;height:55%;border:1.5px solid rgba(255,255,255,.09);border-radius:50%;background:radial-gradient(circle,rgba(74,125,255,.07) 0%,transparent 70%)}
.sc-back::before{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,.06) 50%,transparent 70%);background-size:300% 100%;animation:foil 3.5s ease-in-out infinite}
.sc-face{transform:rotateY(180deg)}
.sc-face img{width:100%;height:100%;object-fit:cover;display:block}
.sc-face-ph{width:100%;height:100%;background:var(--card);display:flex;align-items:center;justify-content:center;color:var(--txt3);font-size:.7rem}

/* ─── CHAMBER CARD ───
   11:27 = extremely tall portrait (≈ 0.41 ratio, nearly 2× taller than regular).
   Sits in a single column — its height determines row 2's height,
   with regular cards in that row appearing shorter beside it. */
.sc.chamber-card{
  aspect-ratio:11/27;
}

/* Chamber back & front styling */
.sc.chamber-card .sc-back::after{display:none}
.sc.chamber-card .sc-back::before{display:none}
.sc.chamber-card .sc-back{
  border:2px solid rgba(240,201,70,.45);
  box-shadow:0 0 22px rgba(240,201,70,.18) inset;
}
.sc.chamber-card .sc-back img{
  width:100%;height:100%;object-fit:cover;display:block;
}
.sc.chamber-card .sc-face{
  border:2px solid rgba(240,201,70,.45);
  box-shadow:0 0 22px rgba(240,201,70,.18) inset;
  background:#040810;
}
.sc.chamber-card .sc-face img{
  object-fit:contain;
  background:#040810;
  width:100%;
  height:100%;
}
.sc.chamber-card.flipped .sc-face::after{
  content:'Tap to flip back';
  position:absolute;
  bottom:0;left:0;right:0;
  padding:4px;
  background:rgba(0,0,0,.55);
  font-size:.48rem;
  font-family:'Nunito Sans',sans-serif;
  font-weight:700;
  text-align:center;
  color:rgba(240,201,70,.8);
  letter-spacing:.06em;
  text-transform:uppercase;
  opacity:0;
  transition:opacity .25s;
}
.sc.chamber-card.flipped:hover .sc-face::after{opacity:1}

.sc.entry{animation:cardIn .45s cubic-bezier(.34,1.3,.64,1) both}
@keyframes cardIn{from{transform:translateY(40px) scale(.72);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}

/* Rarity glows */
.sc.revealed.rarity-common{filter:drop-shadow(0 0 5px rgba(138,142,168,.5))}
.sc.revealed.rarity-uncommon{filter:drop-shadow(0 0 7px rgba(92,184,92,.65));animation:uncommongl 2s ease-in-out infinite alternate}
.sc.revealed.rarity-rare{filter:drop-shadow(0 0 10px rgba(46,140,232,.75))}
.sc.revealed.rarity-zenemental{filter:drop-shadow(0 0 14px rgba(180,77,223,.85));animation:zengl 1.6s ease-in-out infinite alternate}
.sc.revealed.rarity-promo{filter:drop-shadow(0 0 12px rgba(232,182,50,.75))}
.sc.revealed.type-chamber{filter:drop-shadow(0 0 18px rgba(240,201,70,.8));animation:chambergl 1.8s ease-in-out infinite alternate}
@keyframes uncommongl{from{filter:drop-shadow(0 0 4px rgba(92,184,92,.5))}to{filter:drop-shadow(0 0 14px rgba(92,184,92,.95))}}
@keyframes zengl{from{filter:drop-shadow(0 0 8px rgba(180,77,223,.7))}to{filter:drop-shadow(0 0 22px rgba(180,77,223,1))}}
@keyframes chambergl{from{filter:drop-shadow(0 0 10px rgba(240,201,70,.6))}to{filter:drop-shadow(0 0 26px rgba(240,201,70,1))}}

.rarity-ribbon{position:absolute;bottom:0;left:0;right:0;padding:3px 4px;font-size:.48rem;font-weight:700;text-align:center;text-transform:uppercase;letter-spacing:.06em;opacity:0;transition:opacity .3s .3s;z-index:5}
.sc.revealed .rarity-ribbon{opacity:1}
.rarity-ribbon.r-common{background:rgba(138,142,168,.85);color:#fff}
.rarity-ribbon.r-uncommon{background:rgba(92,184,92,.85);color:#fff}
.rarity-ribbon.r-rare{background:rgba(46,140,232,.85);color:#fff}
.rarity-ribbon.r-zenemental{background:rgba(180,77,223,.85);color:#fff}
.rarity-ribbon.r-promo{background:rgba(232,182,50,.9);color:#000}
.rarity-ribbon.r-chamber{background:rgba(240,201,70,.9);color:#000}

/* CONFETTI */
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:400}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:11px 20px;font-size:.82rem;font-weight:600;color:var(--txt);z-index:500;box-shadow:0 8px 32px rgba(0,0,0,.4);transition:transform .35s cubic-bezier(.4,0,.2,1);white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<!-- LOADING -->
<div id="s-loading" class="screen active">
  <div class="ring"></div>
  <div class="ring-text">Loading card database…</div>
</div>

<!-- SETUP -->
<div id="s-setup" class="screen">
  <div id="s-setup-inner">
    <div class="setup-hd">
      <h1>Avatar TCG</h1>
      <h2>Pack Builder</h2>
    </div>
    <div class="sec-lbl">1 — Choose Booster Pack</div>
    <div class="pt-row" id="pt-row"></div>

    <!-- Custom pack image URL (shown only when Custom Pack selected) -->
    <div id="custom-img-row" style="display:none">
      <div class="sec-lbl" style="margin-bottom:6px">Custom Booster Art (Image URL)</div>
      <div class="custom-img-inner">
        <input type="text" id="custom-img-inp" placeholder="Paste image URL…" autocomplete="off">
        <button id="btn-apply-img" class="btn btn-sec" style="flex:0 0 auto"><i class="fas fa-image"></i> Apply</button>
      </div>
      <div id="custom-img-preview" style="display:none">

      <button id="btn-rand" class="btn btn-sec"><i class="fas fa-shuffle"></i> Randomize</button>
      <button id="btn-share-setup" class="btn btn-out" disabled><i class="fas fa-link"></i> Copy Link</button>
      <button id="btn-start" class="btn btn-pri" disabled><i class="fas fa-gift"></i> Open Pack!</button>
    </div>
    <div class="code-row">
      <input type="text" class="code-inp" id="code-inp" placeholder="Paste a friend's share link or code…">
      <button id="btn-load" class="btn btn-sec"><i class="fas fa-upload"></i> Load</button>
    </div>
  </div>
</div>

<!-- PICKER MODAL -->
<div class="modal-bg" id="picker-modal">
  <div class="picker-sheet">
    <div class="pk-hd">
      <div class="pk-title" id="pk-title">Select a Card</div>
      <button class="pk-close" id="pk-close"><i class="fas fa-times"></i></button>
    </div>
    <div class="pk-search-row">
      <input class="pk-search" id="pk-search" placeholder="Search by name or number…" autocomplete="off">
    </div>
    <div class="pk-filters" id="pk-filters"></div>
    <div class="pk-grid" id="pk-grid"></div>
  </div>
</div>

<!-- EXPERIENCE -->
<div id="s-exp" class="screen">
  <button class="exp-back" id="exp-back"><i class="fas fa-arrow-left"></i> Edit Pack</button>
  <button class="exp-share" id="exp-share-btn"><i class="fas fa-link"></i> Share</button>
  <div id="pack-stage"></div>
  <div id="spread-stage"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const CSV_URL = 'https://raw.githubusercontent.com/zolodio/Avatar-TCG-Database/main/Extended%20Database.csv';
const CARDBACK = 'https://raw.githubusercontent.com/zolodio/Avatar-TCG-Database/main/cardback.jpg';

const PACKS = [
  {id:'BSTR001',name:'Foil Pack',sub:'Water & Fire',icon:'🔥',c1:'#0a1428',c2:'#1a0820',c3:'#0a1028',acc:'#2e8ce8'},
  {id:'CUSTOM', name:'Custom Pack',sub:'Your Design',icon:'🎨',c1:'#16101e',c2:'#0e1628',c3:'#16101e',acc:'#e8b632'},
];
const SYMS = {BSTR001:['🌊','🔥','💧'],CUSTOM:['🔮','✨','🌀']};
const RC = {common:'#8b8fa8',uncommon:'#5cb85c',rare:'#2e8ce8',zenemental:'#b44ddf',promo:'#e8b632'};

let allCards=[], packType='BSTR001', slots=Array(10).fill(null);
let pickerSlot=-1, pickerRarity='all', pickerQ='', phase='sealed';
let flipped=new Set(), packData=null;
let customPackImageUrl='';

const $ = id => document.getElementById(id);
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active')}
function toast(msg,d=2300){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d)}

function encPack(ptId,cards){
  const o={p:ptId,c:cards.map(c=>c.number),img:customPackImageUrl||''};
  try{return 'AQS2'+btoa(unescape(encodeURIComponent(JSON.stringify(o))))}catch(e){return null}
}
function decPack(code){
  try{
    const raw=code.startsWith('http')||(code.includes('#'))?code.split('#').pop():code;
    if(!raw.startsWith('AQS2'))return null;
    const o=JSON.parse(decodeURIComponent(escape(atob(raw.slice(4)))));
    if(!o.p||!Array.isArray(o.c))return null;
    return o;
  }catch(e){return null}
}
function isValidForSlot(card, slotIndex){
  const num = parseInt(card.number, 10);
  if (isNaN(num)) return false;
  if (slotIndex === 9) return num >= 176 && num <= 235;
  return num >= 1 && num <= 175;
}
function parseCSV(text){
  const lines=text.replace(/\r/g,'').split('\n').filter(l=>l.trim());
  if(lines.length<2)return[];
  function parseLine(line){
    const p=[];let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(ch===','&&!inQ){p.push(cur.trim());cur='';}
      else cur+=ch;
    }
    p.push(cur.trim());return p;
  }
  function uq(v){v=String(v||'').trim();if(v.length>=2&&v[0]==='"'&&v[v.length-1]==='"')v=v.slice(1,-1);return v;}
  const hdrs=parseLine(lines[0]).map(uq),idx={};hdrs.forEach((h,i)=>idx[h]=i);
  const get=(p,col)=>uq(p[idx[col]]??'');
  const cards=[];
  for(let i=1;i<lines.length;i++){
    const p=parseLine(lines[i]);
    const number=get(p,'Number').trim(),name=get(p,'Name').trim();
    const type=get(p,'Type').toLowerCase().trim(),rarity=get(p,'Rarity').toLowerCase().trim();
    if(!number||!name||!type||!rarity)continue;
    cards.push({number,name,type,rarity,imageLink:get(p,'Image Link').trim(),backImageLink:get(p,'Back Image Link').trim(),set:get(p,'Set')});
  }
  return cards;
}

// SETUP UI
function buildPackRow(){
  const row=$('pt-row');
  row.innerHTML=PACKS.map(pt=>`<div class="ptc${packType===pt.id?' sel':''}" data-id="${pt.id}"><div class="ptc-icon">${pt.icon}</div><div class="ptc-name">${escH(pt.name)}</div><div class="ptc-sub">${escH(pt.sub)}</div></div>`).join('');
  row.querySelectorAll('.ptc').forEach(el=>el.addEventListener('click',()=>{packType=el.dataset.id;buildPackRow();$('custom-img-row').style.display=packType==='CUSTOM'?'':'none';}));
  $('custom-img-row').style.display=packType==='CUSTOM'?'':'none';
}

function buildSlots(){
  const grid=$('slots-grid');
  const filled=slots.filter(Boolean).length;
  $('slot-count').textContent=`${filled} / 10`;
  $('btn-start').disabled=filled<10;
  $('btn-share-setup').disabled=filled<10;
  grid.innerHTML=slots.map((card,i)=>{
    const isCh=i===9;
    if(card){
      const dc=RC[card.rarity]||'#8b8fa8';
      return `<div class="slot has-card${card.type==='chamber'?' chamber-slot':''}" data-slot="${i}">
        ${card.imageLink?`<img src="${escH(card.imageLink)}" alt="${escH(card.name)}" loading="lazy" onerror="this.style.display='none'">`:``}
        <div class="slot-dot" style="background:${dc}"></div>
        <div class="slot-lbl">${escH(card.name)}</div>
        <div class="slot-rm" data-rm="${i}"><i class="fas fa-times"></i></div>
      </div>`;
    }
    return `<div class="slot${isCh?' chamber-slot':''}" data-slot="${i}">
      <div class="slot-empty-icon"><i class="fas fa-${isCh?'border-none':'plus'}"></i></div>
      <div class="slot-empty-txt">${isCh?'Chamber':'Card '+(i+1)}</div>
    </div>`;
  }).join('');
  grid.querySelectorAll('.slot').forEach(el=>{
    el.addEventListener('click',e=>{
      const rmEl=e.target.closest('[data-rm]');
      if(rmEl){e.stopPropagation();slots[parseInt(rmEl.dataset.rm)]=null;buildSlots();return;}
      pickerSlot=parseInt(el.dataset.slot);
      openPicker(pickerSlot===9?'chamber':null);
    });
  });
}

function openPicker(forceR=null){
  pickerRarity='all';pickerQ='';$('pk-search').value='';
  $('picker-modal').classList.add('open');
  buildPkFilters();buildPkGrid();
  setTimeout(()=>$('pk-search').focus(),200);
}
function closePicker(){$('picker-modal').classList.remove('open');pickerSlot=-1}

function buildPkFilters(){
  const isChamberSlot=pickerSlot===9;
  let filters=isChamberSlot
    ?[{id:'all',lbl:'All'},{id:'common',lbl:'Common',cls:'fc'},{id:'uncommon',lbl:'Uncommon',cls:'fc'},{id:'rare',lbl:'Rare',cls:'fr'}]
    :[{id:'all',lbl:'All'},{id:'common',lbl:'Common',cls:'fc'},{id:'uncommon',lbl:'Uncommon',cls:'fc'},{id:'rare',lbl:'Rare',cls:'fr'},{id:'zenemental',lbl:'Zenemental',cls:'fz'}];
  $('pk-filters').innerHTML=filters.map(f=>`<button class="pf ${f.cls||''}${pickerRarity===f.id?' act':''}" data-r="${f.id}">${f.lbl}</button>`).join('');
  $('pk-filters').querySelectorAll('.pf').forEach(el=>el.addEventListener('click',()=>{pickerRarity=el.dataset.r;buildPkFilters();buildPkGrid()}));
}

function buildPkGrid(){
  const q=pickerQ.toLowerCase();
  let cards=allCards.filter(c=>{
    if(pickerSlot>=0&&!isValidForSlot(c,pickerSlot))return false;
    if(q&&c.name.toLowerCase().indexOf(q)===-1&&c.number.toLowerCase().indexOf(q)===-1)return false;
    if(pickerRarity!=='all'){if(pickerRarity==='chamber')return c.type==='chamber';return c.rarity===pickerRarity;}
    return true;
  });
  const grid=$('pk-grid');
  if(cards.length===0){grid.innerHTML='<div class="pk-none">No cards found</div>';return;}
  grid.innerHTML=cards.slice(0,200).map(c=>{
    const dc=RC[c.rarity]||'#8b8fa8';
    return `<div class="pk-item" data-num="${escH(c.number)}">
      <div class="pk-rbar" style="background:${dc}"></div>
      ${c.imageLink?`<img src="${escH(c.imageLink)}" alt="${escH(c.name)}" loading="lazy">`:`<div class="pk-item-img-ph">No img</div>`}
      <div class="pk-name">${escH(c.name)}</div>
      <div class="pk-num">#${escH(c.number)}</div>
    </div>`;
  }).join('');
  grid.querySelectorAll('.pk-item').forEach(el=>{
    el.addEventListener('click',()=>{
      const card=allCards.find(c=>c.number===el.dataset.num);
      if(!card||pickerSlot<0)return;
      if(!isValidForSlot(card,pickerSlot)){toast(pickerSlot===9?'Chamber must be #176–235':'Cards must be #1–175');return;}
      slots[pickerSlot]=card;buildSlots();closePicker();
    });
  });
}

function randomize(){
  const reg=allCards.filter(c=>{const n=parseInt(c.number,10);return n>=1&&n<=175});
  const chs=allCards.filter(c=>{const n=parseInt(c.number,10);return n>=176&&n<=235});
  const pick=arr=>arr[Math.floor(Math.random()*arr.length)];
  for(let i=0;i<9;i++)slots[i]=pick(reg);
  slots[9]=chs.length?pick(chs):null;
  buildSlots();
}

// PACK VISUAL
function buildPackVisual(pt, cards=[]){
  const syms=SYMS[pt.id]||['✨','⭐','💫'];
  const artSrc=(pt.id==='CUSTOM'&&customPackImageUrl)
    ?customPackImageUrl
    :'https://raw.githubusercontent.com/zolodio/Avatar-TCG-Database/main/BSTR001.jpg';

  const peekCards=cards.slice(0,6);
  const angles=[-14,-8,-3,3,8,14];
  const peekHtml=peekCards.map((c,i)=>{
    const bk=(c.type==='chamber'&&c.backImageLink)?c.backImageLink:CARDBACK;
    const ang=angles[i]||0;
    return `<div class="peek-c" style="transform:rotate(${ang}deg);transform-origin:bottom center;">
      <img src="${escH(bk)}" alt="">
    </div>`;
  }).join('');

  return `
<div class="pack-wrap floating" id="pack-wrap">
  <div style="position:relative">
    <div class="pack-top" id="pack-top">
      <img src="${escH(artSrc)}" style="position:absolute;top:0;left:0;width:100%;height:340px;object-fit:cover;" onerror="this.style.display='none'">
      <div class="p-foil"></div>
      <div class="p-glow"></div>
    </div>
    <div class="pack-body" style="background:linear-gradient(160deg,${pt.c1} 0%,${pt.c2} 50%,${pt.c3} 100%)">
      <div class="p-art">
        <img src="${escH(artSrc)}" style="position:absolute;top:-60px;left:0;width:100%;height:340px;object-fit:cover;" onerror="this.style.display='none'">
      </div>
      <div class="p-foil"></div>
      <div class="p-glow"></div>
      <div class="p-circle" style="width:200px;height:200px;top:-60px;right:-80px;background:${pt.acc}"></div>
      <div class="p-circle" style="width:160px;height:160px;bottom:-40px;left:-65px;background:${pt.acc}"></div>
      <div class="p-sym s1">${syms[0]}</div>
      <div class="p-sym s2">${syms[1]}</div>
      <div class="p-sym s3">${syms[2]}</div>
      <div class="p-center-icon">${pt.icon}</div>
    </div>
  </div>
  <div class="pack-peek" id="pack-peek">${peekHtml}</div>
</div>
<div class="hint-txt" id="hint-txt">Tap pack to open</div>`;
}

// EXPERIENCE FLOW
function startExp(data){
  packData=data;flipped.clear();phase='sealed';
  const pt=PACKS.find(p=>p.id===data.packTypeId)||PACKS[0];
  if(data.customImg)customPackImageUrl=data.customImg;
  const stage=$('pack-stage');
  const spread=$('spread-stage');
  stage.style.display='';spread.style.display='none';
  stage.innerHTML=buildPackVisual(pt, data.cards);
  stage.removeEventListener('click',onSealedClick);
  stage.addEventListener('click',onSealedClick);
  showScreen('s-exp');
}

function onSealedClick(){
  if(phase!=='sealed')return;
  phase='shaking';
  const wrap=$('pack-wrap');
  wrap.classList.remove('floating');
  wrap.classList.add('shaking');
  setTimeout(doTear,420);
}

function doTear(){
  phase='opening';
  $('pack-top').classList.add('fly');
  const hint=$('hint-txt');
  if(hint)hint.style.display='none';
  setTimeout(()=>{
    const peek=$('pack-peek');
    if(peek)peek.classList.add('show');
  },300);
  setTimeout(()=>{
    const stage=$('pack-stage');
    const btn=document.createElement('button');
    btn.className='pull-btn';btn.id='pull-btn';
    btn.innerHTML='<i class="fas fa-hand-sparkles"></i> Pull Cards!';
    stage.appendChild(btn);
    stage.removeEventListener('click',onSealedClick);
    btn.addEventListener('click',pullCards,{once:true});
    phase='pulling';
  },700);
}

function pullCards(){
  if(phase!=='pulling')return;
  phase='spread';
  $('pack-stage').style.display='none';
  const spread=$('spread-stage');
  spread.style.display='flex';
  buildSpread();
}

function buildSpread(){
  const cards=packData.cards;
  const spread=$('spread-stage');
  spread.innerHTML=`
    <div class="spread-hd">
      <div class="spread-prog">Tap cards to reveal — <span id="rev-count">0</span> / ${cards.length} revealed</div>
    </div>
    <div class="cards-grid" id="cards-row"></div>
    <div class="spread-footer">
      <div class="done-acts" id="done-acts">
        <button class="btn btn-sec" id="open-again"><i class="fas fa-redo"></i> Open Another</button>
        <button class="btn btn-out" id="share-result"><i class="fas fa-share"></i> Share This Pack</button>
      </div>
    </div>`;

  const row=$('cards-row');

  cards.forEach((card,i)=>{
    const isChamber=card.type==='chamber';
    const el=document.createElement('div');
    el.className=`sc entry${isChamber?' chamber-card':''}`;
    el.style.animationDelay=(i*45)+'ms';
    el.dataset.idx=i;

    const backSrc=(isChamber&&card.backImageLink)?card.backImageLink:CARDBACK;

    el.innerHTML=`
      <div class="sc-inner">
        <div class="sc-back">
          <img src="${escH(backSrc)}" alt="" style="width:100%;height:100%;object-fit:cover;display:block;">
        </div>
        <div class="sc-face">
          ${card.imageLink
            ?`<img src="${escH(card.imageLink)}" alt="${escH(card.name)}" loading="lazy">`
            :`<div class="sc-face-ph">?</div>`}
          <div class="rarity-ribbon r-${card.type==='chamber'?'chamber':card.rarity}">
            ${card.type==='chamber'?'Chamber':card.rarity}
          </div>
        </div>
      </div>`;
    el.addEventListener('click',()=>flipCard(el,card,i));
    row.appendChild(el);
  });

  $('open-again').addEventListener('click',()=>{flipped.clear();showScreen('s-setup');phase='sealed'});
  $('share-result').addEventListener('click',shareExp);
}

function flipCard(el,card,i){
  const isChamber=card.type==='chamber';

  if(isChamber){
    if(el.classList.contains('flipped')){
      el.classList.remove('flipped');
    } else {
      el.classList.add('flipped');
      if(!flipped.has(i)){
        flipped.add(i);
        setTimeout(()=>{
          el.classList.add('revealed','type-chamber');
          const r=el.getBoundingClientRect();
          burst(r.left+r.width/2,r.top+r.height/2,'promo');
        },310);
        updateRevCount();
      }
    }
    return;
  }

  if(flipped.has(i))return;
  flipped.add(i);
  el.classList.add('flipped');
  setTimeout(()=>{
    el.classList.add('revealed',`rarity-${card.rarity}`);
    if(['uncommon','rare','zenemental','promo'].includes(card.rarity)){
      const r=el.getBoundingClientRect();
      burst(r.left+r.width/2,r.top+r.height/2,card.rarity);
    }
  },310);
  updateRevCount();
}

function updateRevCount(){
  const rc=$('rev-count');
  if(rc)rc.textContent=flipped.size;
  if(packData&&flipped.size===packData.cards.length){
    setTimeout(()=>{const d=$('done-acts');if(d)d.classList.add('show')},700);
  }
}

// CONFETTI
const cnv=$('confetti-canvas');
const ctx=cnv.getContext('2d');
let particles=[];let cfRunning=false;
function resizeCnv(){cnv.width=window.innerWidth;cnv.height=window.innerHeight}
resizeCnv();window.addEventListener('resize',resizeCnv);

const BURST_COLORS={
  uncommon:['#5cb85c','#7dd87d','#ffffff','#3db86c','#b8f0b8'],
  rare:['#2e8ce8','#3da5ff','#ffffff','#4a7dff','#87ceeb'],
  zenemental:['#b44ddf','#d16bff','#ffffff','#e8532e','#f0c946','#9b6dff'],
  promo:['#e8b632','#ffd04a','#ffffff','#f0c946','#e8532e'],
};

function burst(cx,cy,rarity){
  const cols=BURST_COLORS[rarity]||['#ffffff','#b44ddf'];
  const count=rarity==='zenemental'?90:rarity==='uncommon'?40:55;
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const spd=3+Math.random()*10;
    particles.push({x:cx,y:cy,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd-5,
      col:cols[Math.floor(Math.random()*cols.length)],
      w:5+Math.random()*9,h:3+Math.random()*5,
      angle:Math.random()*Math.PI*2,spin:(Math.random()-.5)*.28,
      grav:.14+Math.random()*.1,alpha:1,
      shape:Math.random()>.55?'circle':'rect'});
  }
  if(!cfRunning){cfRunning=true;requestAnimationFrame(drawCf)}
}

function drawCf(){
  ctx.clearRect(0,0,cnv.width,cnv.height);
  particles=particles.filter(p=>p.alpha>.04&&p.y<cnv.height+40);
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=p.grav;p.vx*=.992;
    p.angle+=p.spin;p.alpha=Math.max(0,p.alpha-.015);
    ctx.save();ctx.globalAlpha=p.alpha;ctx.translate(p.x,p.y);ctx.rotate(p.angle);ctx.fillStyle=p.col;
    if(p.shape==='circle'){ctx.beginPath();ctx.arc(0,0,p.w/2,0,Math.PI*2);ctx.fill();}
    else{ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);}
    ctx.restore();
  });
  if(particles.length>0)requestAnimationFrame(drawCf);else cfRunning=false;
}

function shareExp(){
  if(!packData)return;
  const code=encPack(packData.packTypeId,packData.cards);
  if(!code)return;
  const url=location.href.split('#')[0]+'#'+code;
  if(navigator.clipboard){navigator.clipboard.writeText(url).then(()=>toast('Share link copied to clipboard!'));}
  else{prompt('Copy this link to share:',url);}
}

// INIT
async function init(){
  showScreen('s-loading');
  try{
    const r=await fetch(CSV_URL);
    if(!r.ok)throw new Error('HTTP '+r.status);
    allCards=parseCSV(await r.text());
  }catch(e){console.warn('CSV failed:',e);allCards=[];}

  const hash=location.hash.slice(1);
  if(hash&&hash.startsWith('AQS2')){
    const dec=decPack(hash);
    if(dec){
      const cards=dec.c.map(n=>allCards.find(c=>c.number===n)).filter(Boolean);
      if(cards.length>0){
        if(dec.img)customPackImageUrl=dec.img;
        startExp({packTypeId:dec.p,cards,customImg:dec.img||''});
        setupExpBtns();return;
      }
    }
  }

  buildPackRow();buildSlots();buildPkFilters();

  $('pk-close').addEventListener('click',closePicker);
  $('picker-modal').addEventListener('click',e=>{if(e.target===$('picker-modal'))closePicker()});
  $('pk-search').addEventListener('input',function(){pickerQ=this.value;buildPkGrid()});

  $('btn-rand').addEventListener('click',randomize);
  $('btn-start').addEventListener('click',()=>{
    const cards=slots.filter(Boolean);
    if(cards.length<10){toast('Please fill all 10 card slots!');return;}
    const data={packTypeId:packType,cards,customImg:customPackImageUrl};
    const code=encPack(packType,cards);
    if(code)history.replaceState(null,'','#'+code);
    startExp(data);setupExpBtns();
  });
  $('btn-share-setup').addEventListener('click',()=>{
    const cards=slots.filter(Boolean);
    if(cards.length<10)return;
    const code=encPack(packType,cards);
    const url=location.href.split('#')[0]+'#'+code;
    if(navigator.clipboard){navigator.clipboard.writeText(url).then(()=>toast('Share link copied!'));}
    else{prompt('Copy:',url);}
  });
  $('btn-load').addEventListener('click',()=>{
    const inp=$('code-inp').value.trim();
    if(!inp)return;
    const dec=decPack(inp);
    if(!dec){toast('Invalid code or link');return;}
    const cards=dec.c.map(n=>allCards.find(c=>c.number===n)).filter(Boolean);
    if(cards.length===0){toast('No cards found');return;}
    if(dec.img)customPackImageUrl=dec.img;
    startExp({packTypeId:dec.p,cards,customImg:dec.img||''});setupExpBtns();
  });
  $('code-inp').addEventListener('keydown',e=>{if(e.key==='Enter')$('btn-load').click()});

  $('btn-apply-img').addEventListener('click',applyCustomImg);
  $('custom-img-inp').addEventListener('keydown',e=>{if(e.key==='Enter')applyCustomImg()});

  setupExpBtns();
  showScreen('s-setup');
}

function applyCustomImg(){
  const url=$('custom-img-inp').value.trim();
  if(!url){customPackImageUrl='';$('custom-img-preview').style.display='none';toast('Image URL cleared');return;}
  const img=new Image();
  img.onload=()=>{
    customPackImageUrl=url;
    $('custom-img-thumb').src=url;
    $('custom-img-preview').style.display='flex';
    toast('Booster art applied!');
  };
  img.onerror=()=>{toast('Could not load that image URL');};
  img.src=url;
}

function setupExpBtns(){
  $('exp-back').onclick=()=>{showScreen('s-setup');phase='sealed';packData=null};
  $('exp-share-btn').onclick=()=>{
    if(!packData)return;
    const code=encPack(packData.packTypeId,packData.cards);
    const url=location.href.split('#')[0]+'#'+code;
    if(navigator.clipboard){navigator.clipboard.writeText(url).then(()=>toast('Share link copied!'));}
    else{prompt('Copy:',url);}
  };
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if($('picker-modal').classList.contains('open'))closePicker();
    else if(document.querySelector('#s-exp.active'))showScreen('s-setup');
  }
});

init();
</script>
